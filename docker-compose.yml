version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: agricosmo_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-agricosmo}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-agricosmo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agricosmo-network

  redis:
    image: redis:7-alpine
    container_name: agricosmo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agricosmo-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agricosmo_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - agricosmo-network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agricosmo_celery
    restart: unless-stopped
    command: celery -A app.core.celery_app worker -l info -Q default,ai_tasks,image_tasks,analytics_tasks
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - .env
    networks:
      - agricosmo-network

  frontend:
    build:
      context: ./plantai-insights-main/plantai-insights-main
      dockerfile: Dockerfile
    container_name: agricosmo_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - agricosmo-network

volumes:
  postgres_data:

networks:
  agricosmo-network:
    driver: bridge
